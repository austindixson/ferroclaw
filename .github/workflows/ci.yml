name: ci
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify docs/license
        run: |
          test -f README.md || test -f readme.md
          test -f LICENSE || test -f LICENSE.md || test -f LICENSE.txt
      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'setup.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python tests
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'setup.py') != '' }}
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest || true
          pytest -q || true
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Node tests
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci || npm install
          npm test --if-present
      - name: Setup Rust
        if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        if: ${{ hashFiles('Cargo.toml') != '' }}
        run: cargo test --all --quiet
